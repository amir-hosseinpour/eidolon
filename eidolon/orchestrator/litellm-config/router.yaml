model_list:
  - model_name: gemini/2.5-pro
    litellm_params:
      model: gemini/gemini-2.5-pro
      api_key: os.environ/GEMINI_API_KEY

  - model_name: local/whiterabbitneo-2.5-7b
    litellm_params:
      model: openai/whiterabbitneo-2.5-7b
      api_base: http://127.0.0.1:8081/v1
      api_key: sk-local

  - model_name: local/foundation-sec-8b
    litellm_params:
      model: openai/foundation-sec-8b
      api_base: http://127.0.0.1:8082/v1
      api_key: sk-local

  - model_name: local/qwen2.5-coder-14b
    litellm_params:
      model: openai/qwen2.5-coder-14b
      api_base: http://127.0.0.1:8083/v1
      api_key: sk-local

router_settings:
  routing_strategy: usage-based-routing-v2
  fallbacks:
    - gemini/2.5-pro: ["local/qwen2.5-coder-14b"]

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL

litellm_settings:
  drop_params: true
  set_verbose: false
  telemetry: false
  cache: false

model_group_alias:
  planner: gemini/2.5-pro
  reporter: gemini/2.5-pro
  no-egress-analyst: local/whiterabbitneo-2.5-7b
  defender-assistant: local/foundation-sec-8b
  tool-caller: local/qwen2.5-coder-14b
